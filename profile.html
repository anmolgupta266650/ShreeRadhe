<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile | Shreeradhe</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .profile-layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 32px;
      margin-top: 32px;
    }
    
    .profile-sidebar {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    
    .profile-sidebar-header {
      padding: 24px;
      text-align: center;
      border-bottom: 1px solid var(--border);
    }
    
    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: var(--radius-full);
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin: 0 auto 12px;
    }
    
    .profile-menu {
      display: flex;
      flex-direction: column;
    }
    
    .profile-menu button, .profile-menu a {
      padding: 16px 24px;
      text-align: left;
      background: none;
      border: none;
      border-bottom: 1px solid var(--border);
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      display: block;
      width: 100%;
    }
    
    .profile-menu button:hover, .profile-menu a:hover {
      background: rgba(196, 91, 124, 0.05);
      color: var(--primary);
    }
    
    .profile-menu button.active {
      background: rgba(196, 91, 124, 0.1);
      color: var(--primary);
      border-left: 3px solid var(--primary);
    }
    
    .profile-content {
      background: var(--bg-card);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-sm);
      padding: 32px;
    }
    
    .profile-tab-pane {
      display: none;
    }
    
    .profile-tab-pane.active {
      display: block;
      animation: fadeIn 0.4s;
    }
    
    .order-card {
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px;
      margin-bottom: 16px;
    }
    
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--border);
    }
    
    @media (max-width: 768px) {
      .profile-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="navbarContainer"></div>

  <div class="page-header">
    <div class="container">
      <h1>My Dashboard</h1>
    </div>
  </div>

  <div class="container pb-5" style="padding-bottom: 80px;">
    <div class="profile-layout">
      
      <!-- Sidebar -->
      <div class="profile-sidebar">
        <div class="profile-sidebar-header">
          <div class="profile-avatar">👤</div>
          <h3 id="userDisplayPhone">Loading...</h3>
          <p class="text-muted" style="font-size:0.85rem;">Verified Customer</p>
        </div>
        <div class="profile-menu">
          <button class="active" onclick="switchProfileTab('info', this)">My Details</button>
          <button onclick="switchProfileTab('orders', this)">My Orders</button>
          <a href="wishlist.html">My Wishlist</a>
          <button onclick="handleUserLogout()" style="color:var(--error);">Logout</button>
        </div>
      </div>
      
      <!-- Main Content -->
      <div class="profile-content">
        
        <!-- Info Tab -->
        <div id="tab-info" class="profile-tab-pane active">
          <h2>Account Information</h2>
          <p class="text-muted mb-3">Manage your personal information</p>
          
          <div class="form-group mb-2">
            <label>Registered Phone Number</label>
            <input type="text" id="infoPhone" disabled style="background:var(--bg);">
          </div>
          <div class="form-group mb-2">
            <label>Name</label>
            <input type="text" id="infoName" placeholder="Your Name">
          </div>
          <div class="form-group mb-2">
            <label>Email Address (Optional)</label>
            <input type="email" id="infoEmail" placeholder="your@email.com">
          </div>
          <button class="btn btn-primary" onclick="showToast('Profile updated successfully!', 'success')">Save Changes</button>
        </div>
        
        <!-- Orders Tab -->
        <div id="tab-orders" class="profile-tab-pane">
          <h2>Order History</h2>
          <p class="text-muted mb-3">Track and manage your recent orders</p>
          
          <div id="ordersContainer">
            <!-- Orders injected here -->
            <p>Loading orders...</p>
          </div>
        </div>
        
      </div>
      
    </div>
  </div>

  <div id="footerContainer"></div>

  <script src="js/data.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/app.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
