<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart | Shreeradhe</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbarContainer"></div>

  <div class="page-header">
    <div class="container">
      <h1 data-lang="cart_title">Shopping Cart</h1>
    </div>
  </div>

  <section class="section cart-page" style="padding-top:0;">
    <div class="container">
      <div id="emptyCart" class="empty-state" style="display:none;">
        <div class="empty-state-icon">🛒</div>
        <h3 data-lang="cart_empty">Your cart is empty</h3>
        <p data-lang="cart_empty_desc">Looks like you haven't added anything yet</p>
        <a href="shop.html" class="btn btn-primary" data-lang="cart_continue">Continue Shopping</a>
      </div>

      <div id="cartLayout" class="cart-layout" style="display:none;">
        <div class="cart-items" id="cartItemsContainer">
          <!-- Cart items injected via JS -->
        </div>

        <div class="cart-summary">
          <h3 data-lang="cart_summary">Order Summary</h3>
          
          <div class="summary-row">
            <span data-lang="cart_subtotal">Subtotal</span>
            <span id="cartSubtotal">₹0</span>
          </div>

          <div class="coupon-input">
            <input type="text" id="couponCode" placeholder="Enter coupon code" data-lang="cart_coupon_placeholder">
            <button class="btn btn-secondary" onclick="applyCoupon()" data-lang="cart_apply">Apply</button>
          </div>
          <div class="coupon-success" id="couponSuccess">
            <span>✅</span> <span id="couponSuccessMsg"></span>
          </div>
          <div class="coupon-error" id="couponError">
            <span id="couponErrorMsg"></span>
          </div>

          <div class="summary-row" id="discountRow" style="display:none;">
            <span data-lang="cart_discount">Discount</span>
            <span class="discount" id="cartDiscount">-₹0</span>
          </div>

          <div class="summary-row">
            <span data-lang="cart_shipping">Shipping</span>
            <span id="cartShipping">₹0</span>
          </div>

          <div class="summary-row total">
            <span data-lang="cart_total">Total</span>
            <span id="cartTotal">₹0</span>
          </div>

          <button class="btn btn-primary" onclick="proceedToCheckout()" data-lang="cart_checkout">Proceed to Checkout</button>
          
          <div style="text-align:center; margin-top:16px;">
            <a href="shop.html" style="font-size:0.9rem; color:var(--primary); text-decoration:underline;" data-lang="cart_continue">Continue Shopping</a>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div id="footerContainer"></div>

  <script src="js/data.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cart.js"></script>
</body>
</html>
