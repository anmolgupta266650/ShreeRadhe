<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Order | Shreeradhe</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="navbarContainer"></div>

  <div class="page-header">
    <div class="container">
      <h1 data-lang="track_title">Track Your Order</h1>
    </div>
  </div>

  <section class="section tracking-page" style="padding-top:0;">
    <div class="container">
      
      <div class="tracking-search">
        <p data-lang="track_desc">Enter your order ID to track your package</p>
        <form class="tracking-input" onsubmit="handleTrack(event)">
          <input type="text" id="trackInput" required placeholder="Enter Order ID" data-lang="track_placeholder" style="flex:1;">
          <button type="submit" class="btn btn-primary" data-lang="track_btn">Track</button>
        </form>
        <div id="trackError" style="color:var(--error); margin-top:12px; display:none;" data-lang="track_not_found">Order not found</div>
      </div>

      <div class="tracking-result" id="trackingResult">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:16px; margin-bottom:24px;">
          <div>
            <h3 id="displayOrderId"></h3>
            <p style="color:var(--text-muted); font-size:0.9rem;" id="displayOrderDate"></p>
          </div>
          <div style="font-weight:700; color:var(--primary);" id="displayOrderTotal"></div>
        </div>
        
        <div class="tracking-progress">
          <div class="progress-fill" id="progressFill" style="width:0%;"></div>
          
          <div class="tracking-step" id="step1">
            <div class="step-icon">📋</div>
            <div class="step-label" data-lang="track_ordered">Ordered</div>
          </div>
          
          <div class="tracking-step" id="step2">
            <div class="step-icon">📦</div>
            <div class="step-label" data-lang="track_shipped">Shipped</div>
          </div>
          
          <div class="tracking-step" id="step3">
            <div class="step-icon">🚚</div>
            <div class="step-label" data-lang="track_out_delivery">Out for Delivery</div>
          </div>
          
          <div class="tracking-step" id="step4">
            <div class="step-icon">✨</div>
            <div class="step-label" data-lang="track_delivered">Delivered</div>
          </div>
        </div>
      </div>
      
    </div>
  </section>

  <div id="footerContainer"></div>

  <script src="js/data.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/app.js"></script>
  <script src="js/track.js"></script>
</body>
</html>
